  .partner-card { grid-template-columns: 1fr; gap: 28px; }
  .partner-kicker { min-height: auto; flex-direction: row; justify-content: flex-start; border-right: 0; border-bottom: 1px solid rgba(255,255,255,.13); padding-bottom: 28px; }
  .partner-kicker i { width: 24px; height: 1px; margin: 0 10px; }
