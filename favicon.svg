  .header-inner,
  .hero-grid,
  .intro-grid,
  .service-layout,
  .process-grid,
  .about-grid,
  .faq-grid,
  .contact-shell,
  .partner-card,
  .footer-top,
  .footer-bottom,
  .promise-grid,
  .audience-grid,
  .values-grid { min-width: 0; }
  .hero-grid > *,
  .intro-grid > *,
  .service-layout > *,
  .process-grid > *,
  .about-grid > *,
  .faq-grid > *,
  .contact-shell > *,
  .partner-card > *,
  .footer-top > * { min-width: 0; }

  .site-header { height: var(--header-height); }
  .header-inner { gap: 12px; }
  .brand { min-width: 0; max-width: calc(100% - 58px); }
  .brand-copy { min-width: 0; }
  .brand-copy strong,
  .brand-copy small { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nav-toggle { flex: 0 0 46px; }
  .site-nav {
    top: var(--header-height);
    right: 0;
    bottom: auto;
    left: 0;
    max-height: calc(100dvh - var(--header-height));
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .hero { min-height: 0; padding-top: calc(var(--header-height) + 42px); }
  .hero h1 { max-width: 13ch; font-size: clamp(46px, 9.2vw, 68px); overflow-wrap: normal; }
  .hero-lead { max-width: 62ch; }
  .hero-visual { width: min(100%, 620px); padding-left: 0; }
  .photo-frame { transform: none; }
  .photo-frame img,
  .about-photo img { height: auto; aspect-ratio: auto; object-fit: contain; }
  .hero-note-top { right: 0; }
  .hero-note-bottom { left: 0; }

  .section-heading h2,
  .process-copy h2,
  .values-heading h2,
  .partner-card h2,
  .about-copy h2,
  .contact-copy h2 { overflow-wrap: anywhere; }

  .service-feature { min-height: 0; }
  .service-feature h3 { max-width: 100%; }
  .service-list article,
  .process-steps li { min-width: 0; }
  .service-list article > div,
  .process-steps li > div { min-width: 0; }

  .about-photo { margin-inline: auto; }
  .about-seal { right: 8px; }
  .direct-contact strong,
  .builder-preview p,
  .footer-top p,
  .footer-bottom span,
  .legal-card p,
  .legal-card li { overflow-wrap: anywhere; }
}

