  .hero-note small { font-size: 9px; }
  .trust-ribbon { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 50px; padding: 18px; }
  .trust-ribbon i { display: none; }
  .section-heading h2, .process-copy h2, .values-heading h2, .partner-card h2, .about-copy h2, .contact-copy h2 { font-size: clamp(38px, 11vw, 52px); }
  .intro-story .lead, .about-copy .lead { font-size: 19px; }
