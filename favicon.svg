:root {
  --ink: #17352c;
  --ink-2: #24483d;
  --ink-3: #31594c;
  --green: #8ac63f;
  --green-deep: #6ca62b;
  --green-pale: #e9f4d7;
  --mint: #dff0e8;
  --cream: #f7f5ef;
  --paper: #fffdf9;
  --sand: #ece8df;
  --line: rgba(23, 53, 44, .14);
  --text: #20322c;
  --muted: #63716c;
  --white: #fff;
  --shadow-sm: 0 18px 45px rgba(26, 48, 40, .09);
  --shadow-lg: 0 34px 90px rgba(15, 37, 30, .18);
  --radius-sm: 16px;
  --radius: 26px;
  --radius-lg: 42px;
  --container: 1180px;
  --header-height: 84px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-height) + 18px); overflow-x: clip; }
body {
  margin: 0;
  overflow-x: clip;
  color: var(--text);
  background: var(--cream);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 17px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body.nav-open { overflow: hidden; }
img, svg { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button, input, textarea, select { font: inherit; }
button { color: inherit; }
p, h1, h2, h3 { margin-top: 0; }
p:last-child { margin-bottom: 0; }
::selection { color: var(--ink); background: var(--green); }

.container { width: min(calc(100% - 40px), var(--container)); margin-inline: auto; }
.section { position: relative; padding: 118px 0; }
.skip-link {
  position: fixed;
  z-index: 9999;
  top: 12px;
  left: 12px;
  padding: 12px 16px;
  color: white;
  background: var(--ink);
  border-radius: 10px;
  transform: translateY(-150%);
}
.skip-link:focus { transform: none; }

.site-header {
  position: fixed;
  z-index: 1000;
  top: 0;
  left: 0;
  width: 100%;
  height: var(--header-height);
  border-bottom: 1px solid transparent;
  transition: background .3s ease, border-color .3s ease, box-shadow .3s ease;
}
.site-header.is-scrolled {
  background: rgba(247, 245, 239, .92);
  border-color: var(--line);
  box-shadow: 0 12px 40px rgba(25, 49, 41, .07);
  backdrop-filter: blur(16px);
}
.header-inner { height: 100%; display: flex; align-items: center; justify-content: space-between; }
.brand { display: inline-flex; align-items: center; gap: 12px; min-width: max-content; }
.brand-mark {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  color: white;
  background: var(--ink);
  border-radius: 15px;
  font-weight: 900;
  font-size: 17px;
  letter-spacing: -.04em;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
}
.brand-copy { display: flex; flex-direction: column; line-height: 1.05; }
.brand-copy strong { font-size: 18px; letter-spacing: -.03em; }
.brand-copy small { margin-top: 5px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
.site-nav { display: flex; align-items: center; gap: 32px; }
.site-nav > a { position: relative; font-size: 14px; font-weight: 750; }
.site-nav > a:not(.nav-cta)::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -7px;
  width: 100%;
  height: 2px;
  background: var(--green-deep);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform .25s ease;
}
.site-nav > a:not(.nav-cta):hover::after,
.site-nav > a:not(.nav-cta):focus-visible::after { transform: scaleX(1); transform-origin: left; }
.nav-cta { padding: 12px 18px; color: white; background: var(--ink); border-radius: 999px; box-shadow: 0 8px 25px rgba(23,53,44,.18); }
.nav-cta:hover { background: var(--ink-2); transform: translateY(-1px); }
.nav-toggle { display: none; width: 46px; height: 46px; padding: 0; border: 0; background: transparent; }
.nav-toggle span { width: 24px; height: 2px; display: block; margin: 5px auto; background: var(--ink); transition: .25s ease; }

.hero {
  min-height: 760px;
  padding: 154px 0 64px;
  overflow: hidden;
  background:
    radial-gradient(circle at 80% 15%, rgba(138,198,63,.18), transparent 24%),
    radial-gradient(circle at 15% 80%, rgba(83,163,131,.11), transparent 26%),
    linear-gradient(180deg, #fbfaf6 0%, var(--cream) 100%);
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: .42;
  background-image: linear-gradient(rgba(23,53,44,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(23,53,44,.035) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: linear-gradient(to bottom, black 0%, transparent 75%);
}
.hero-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 1.03fr .97fr; gap: 76px; align-items: center; }
.eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--green-deep); font-size: 12px; font-weight: 850; letter-spacing: .16em; text-transform: uppercase; }
.eyebrow > span { width: 24px; height: 2px; background: currentColor; }
.hero h1, .section-heading h2, .about-copy h2, .contact-copy h2, .process-copy h2, .values-heading h2, .partner-card h2 {
  margin-bottom: 26px;
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 500;
  line-height: 1.04;
  letter-spacing: -.045em;
}
.hero h1 { max-width: 720px; font-size: clamp(54px, 6vw, 88px); }
.hero h1 em { position: relative; color: var(--green-deep); font-style: normal; }
.hero h1 em::after { content: ""; position: absolute; left: 1%; right: 0; bottom: 3px; height: 10px; z-index: -1; background: rgba(138,198,63,.22); border-radius: 100%; transform: rotate(-1deg); }
.hero-lead { max-width: 665px; margin-bottom: 34px; color: #485b54; font-size: clamp(18px, 1.6vw, 21px); line-height: 1.65; }
.hero-actions { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; }
.button {
  min-height: 54px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 13px 22px;
  border: 1px solid transparent;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 800;
  transition: transform .25s ease, box-shadow .25s ease, background .25s ease, border-color .25s ease;
}
.button:hover { transform: translateY(-2px); }
.button-primary { color: white; background: var(--ink); box-shadow: 0 16px 35px rgba(23,53,44,.22); }
.button-primary:hover { background: var(--ink-2); box-shadow: 0 20px 45px rgba(23,53,44,.28); }
.button-quiet { color: var(--ink); background: rgba(255,255,255,.65); border-color: var(--line); }
.button-quiet svg { width: 18px; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.8; }
.button-quiet:hover { background: white; border-color: rgba(23,53,44,.25); }
.hero-trust { display: flex; flex-wrap: wrap; gap: 16px 22px; margin: 30px 0 0; padding: 0; list-style: none; color: var(--muted); font-size: 13px; font-weight: 700; }
.hero-trust li { display: flex; align-items: center; gap: 7px; }
.hero-trust li span { width: 21px; height: 21px; display: grid; place-items: center; color: var(--ink); background: var(--green-pale); border-radius: 50%; font-size: 11px; }
.hero-visual { position: relative; min-width: 0; padding: 26px 0 34px 22px; }
.photo-frame { position: relative; overflow: hidden; border: 9px solid rgba(255,255,255,.78); border-radius: 44px 44px 120px 44px; box-shadow: var(--shadow-lg); transform: rotate(1.2deg); }
.photo-frame::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 56%, rgba(17,39,32,.18) 100%); pointer-events: none; }
.photo-frame img { width: 100%; aspect-ratio: 1.24 / 1; object-fit: cover; }
.photo-label { position: absolute; z-index: 2; left: 28px; bottom: 24px; display: flex; flex-direction: column; padding: 13px 18px; color: white; background: rgba(23,53,44,.86); border: 1px solid rgba(255,255,255,.18); border-radius: 16px; backdrop-filter: blur(12px); }
.photo-label span { font-size: 10px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; opacity: .72; }
.photo-label strong { margin-top: 2px; font-size: 19px; }
.hero-note { position: absolute; z-index: 3; display: flex; align-items: center; gap: 12px; padding: 13px 16px; background: rgba(255,253,249,.93); border: 1px solid rgba(23,53,44,.1); border-radius: 18px; box-shadow: var(--shadow-sm); backdrop-filter: blur(10px); }
.hero-note p { display: flex; flex-direction: column; margin: 0; line-height: 1.3; }
.hero-note strong { color: var(--ink); font-size: 13px; }
.hero-note small { margin-top: 3px; color: var(--muted); font-size: 10px; }
.hero-note-top { top: 0; right: -14px; }
.hero-note-bottom { left: -18px; bottom: 0; }
.note-icon { width: 38px; height: 38px; display: grid; place-items: center; color: var(--ink); background: var(--green-pale); border-radius: 12px; font-size: 12px; font-weight: 900; }
.note-pulse { position: relative; width: 34px; height: 34px; background: var(--green); border-radius: 50%; }
.note-pulse::after { content: ""; position: absolute; inset: -5px; border: 1px solid var(--green); border-radius: inherit; animation: pulse 2.2s ease-out infinite; }
@keyframes pulse { 0% { opacity: .8; transform: scale(.75); } 80%,100% { opacity: 0; transform: scale(1.4); } }
.trust-ribbon { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; margin-top: 78px; padding: 22px 28px; color: var(--ink); background: rgba(255,255,255,.58); border: 1px solid rgba(23,53,44,.1); border-radius: 18px; backdrop-filter: blur(10px); }
.trust-ribbon span { font-size: 12px; font-weight: 850; letter-spacing: .08em; text-transform: uppercase; }
.trust-ribbon i { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }

.intro-grid { display: grid; grid-template-columns: .9fr 1.1fr; gap: 90px; align-items: start; }
.section-heading { max-width: 720px; }
.section-heading h2, .process-copy h2, .values-heading h2, .partner-card h2, .about-copy h2, .contact-copy h2 { font-size: clamp(41px, 4.3vw, 65px); }
.section-heading > p:not(.eyebrow), .process-copy > p, .faq-section .section-heading > p:not(.eyebrow) { color: var(--muted); }
.intro-story .lead, .about-copy .lead { color: var(--ink); font-size: 22px; line-height: 1.55; }
.intro-story p:not(.lead), .about-copy p:not(.lead) { color: var(--muted); }
.promise-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 76px; }
.promise-card { position: relative; min-height: 285px; padding: 32px; overflow: hidden; background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease; }
.promise-card:hover { transform: translateY(-7px); border-color: rgba(108,166,43,.35); box-shadow: var(--shadow-sm); }
.promise-card::after { content: ""; position: absolute; width: 140px; height: 140px; right: -70px; bottom: -70px; background: var(--green-pale); border-radius: 50%; transition: transform .35s ease; }
.promise-card:hover::after { transform: scale(1.2); }
.promise-number { color: var(--green-deep); font-size: 12px; font-weight: 900; letter-spacing: .12em; }
.promise-card h3 { max-width: 290px; margin: 44px 0 14px; color: var(--ink); font-size: 24px; line-height: 1.25; letter-spacing: -.025em; }
.promise-card p { position: relative; z-index: 1; color: var(--muted); font-size: 15px; }

.section-dark { overflow: hidden; color: white; background: var(--ink); }
.section-dark::before { content: ""; position: absolute; width: 620px; height: 620px; top: -350px; right: -220px; border: 1px solid rgba(255,255,255,.08); border-radius: 50%; box-shadow: 0 0 0 100px rgba(255,255,255,.015), 0 0 0 210px rgba(255,255,255,.012); }
.section-heading-light { position: relative; z-index: 1; }
.section-heading-light h2 { color: white; }
.section-heading-light > p:not(.eyebrow) { max-width: 650px; color: rgba(255,255,255,.63); }
.section-dark .eyebrow { color: #b7dd83; }
.service-layout { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 58px; }
.service-feature { min-height: 520px; display: flex; flex-direction: column; justify-content: space-between; padding: 42px; background: linear-gradient(145deg, rgba(138,198,63,.98), rgba(102,166,44,.92)); border-radius: var(--radius-lg); color: var(--ink); box-shadow: 0 30px 80px rgba(0,0,0,.15); }
.service-icon { width: 78px; height: 78px; display: grid; place-items: center; background: rgba(255,255,255,.38); border-radius: 24px; }
.service-icon svg { width: 46px; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.2; }
.mini-label { margin-bottom: 13px; font-size: 11px; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; opacity: .7; }
.service-feature h3 { max-width: 520px; margin-bottom: 20px; font-family: Georgia, serif; font-size: clamp(35px, 3.7vw, 51px); font-weight: 500; line-height: 1.08; letter-spacing: -.035em; }
.service-feature p:last-child { max-width: 600px; }
.service-list { display: grid; gap: 12px; }
.service-list article { display: grid; grid-template-columns: 52px 1fr; gap: 18px; align-items: start; padding: 26px; background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.09); border-radius: 22px; transition: background .25s ease, transform .25s ease; }
.service-list article:hover { background: rgba(255,255,255,.09); transform: translateX(4px); }
.service-list article > span { width: 42px; height: 42px; display: grid; place-items: center; color: #cbe7a7; border: 1px solid rgba(183,221,131,.35); border-radius: 13px; font-size: 12px; font-weight: 900; }
.service-list h3 { margin-bottom: 7px; color: white; font-size: 19px; }
.service-list p { color: rgba(255,255,255,.62); font-size: 14px; }
.audience-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-top: 22px; }
.audience-card { padding: 34px; color: var(--ink); background: #f3f0e8; border-radius: var(--radius); }
.audience-card-accent { background: #e6f0df; }
.audience-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; }
.audience-top span { color: var(--green-deep); font-size: 11px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
.audience-top svg { width: 33px; fill: var(--ink); }
.audience-card h3 { margin-bottom: 12px; font-size: 28px; letter-spacing: -.03em; }
.audience-card p { color: #596861; font-size: 15px; }
.audience-card ul { display: flex; flex-wrap: wrap; gap: 8px; margin: 24px 0 0; padding: 0; list-style: none; }
.audience-card li { padding: 7px 11px; background: rgba(255,255,255,.7); border: 1px solid rgba(23,53,44,.09); border-radius: 999px; font-size: 11px; font-weight: 750; }

.section-process { background: var(--paper); }
.process-grid { display: grid; grid-template-columns: .75fr 1.25fr; gap: 96px; align-items: start; }
.process-copy { position: sticky; top: 130px; }
.process-copy > p:not(.eyebrow) { max-width: 440px; }
.text-link { display: inline-flex; align-items: center; gap: 10px; margin-top: 22px; color: var(--ink); font-size: 14px; font-weight: 850; }
.text-link span { width: 35px; height: 35px; display: grid; place-items: center; background: var(--green-pale); border-radius: 50%; transition: transform .25s ease; }
.text-link:hover span { transform: translateX(4px); }
.process-steps { margin: 0; padding: 0; list-style: none; }
.process-steps li { position: relative; display: grid; grid-template-columns: 72px 1fr; gap: 28px; padding: 0 0 48px; }
.process-steps li:not(:last-child)::before { content: ""; position: absolute; left: 27px; top: 61px; bottom: 8px; width: 1px; background: var(--line); }
.process-steps li > span { width: 56px; height: 56px; display: grid; place-items: center; color: var(--ink); background: var(--green-pale); border: 1px solid rgba(108,166,43,.2); border-radius: 18px; font-size: 12px; font-weight: 900; }
.process-steps h3 { margin: 2px 0 9px; color: var(--ink); font-size: 25px; letter-spacing: -.025em; }
.process-steps p { color: var(--muted); }

.values-section { padding-top: 0; background: var(--paper); }
.values-shell { padding: 78px; background: var(--cream); border: 1px solid var(--line); border-radius: 46px; }
.values-heading { max-width: 860px; }
.values-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 54px; }
.value-card { min-height: 310px; padding: 32px; background: var(--paper); border: 1px solid rgba(23,53,44,.1); border-radius: 24px; }
.value-icon { width: 46px; height: 46px; display: grid; place-items: center; color: var(--ink); background: var(--green-pale); border-radius: 14px; font-size: 23px; }
.value-card h3 { margin: 52px 0 12px; color: var(--ink); font-size: 24px; letter-spacing: -.025em; }
.value-card p { color: var(--muted); font-size: 15px; }

.about-section { overflow: hidden; }
.about-grid { display: grid; grid-template-columns: .95fr 1.05fr; gap: 92px; align-items: center; }
.about-photo { position: relative; }
.about-photo picture { display: block; overflow: hidden; border-radius: 38px 38px 120px 38px; box-shadow: var(--shadow-lg); }
.about-photo img { width: 100%; aspect-ratio: 1.18 / 1; object-fit: cover; }
.about-photo::before { content: ""; position: absolute; width: 190px; height: 190px; left: -48px; bottom: -42px; z-index: -1; background: var(--green-pale); border-radius: 50%; }
.about-seal { position: absolute; right: -22px; bottom: 42px; width: 140px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: var(--ink); border: 7px solid var(--cream); border-radius: 50%; text-align: center; box-shadow: var(--shadow-sm); }
.about-seal strong { font-family: Georgia, serif; font-size: 44px; line-height: 1; }
.about-seal span { margin-top: 5px; font-size: 9px; font-weight: 850; letter-spacing: .08em; line-height: 1.25; text-transform: uppercase; }
.about-signature { display: flex; flex-direction: column; margin-top: 32px; }
.about-signature span { color: var(--ink); font-family: "Segoe Script", "Bradley Hand", cursive; font-size: 30px; transform: rotate(-2deg); }
.about-signature small { margin-top: 1px; color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }

.partner-section { padding-top: 0; }
.partner-card { display: grid; grid-template-columns: 145px .8fr 1.2fr; gap: 46px; align-items: center; padding: 54px; color: white; background: var(--ink); border-radius: 34px; box-shadow: var(--shadow-lg); }
.partner-card h2 { margin-bottom: 0; color: white; font-size: clamp(35px, 3.3vw, 49px); }
.partner-card .eyebrow { color: #b9dd86; }
.partner-kicker { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 180px; border-right: 1px solid rgba(255,255,255,.13); font-size: 13px; font-weight: 900; letter-spacing: .09em; text-transform: uppercase; }
.partner-kicker span:first-child { width: 64px; height: 64px; display: grid; place-items: center; color: var(--ink); background: var(--green); border-radius: 20px; font-size: 19px; }
.partner-kicker i { width: 1px; height: 24px; margin: 9px 0; background: rgba(255,255,255,.25); }
.partner-copy p { color: rgba(255,255,255,.65); font-size: 14px; }
.partner-copy p + p { margin-top: 15px; }

.faq-section { background: var(--mint); }
.faq-grid { display: grid; grid-template-columns: .8fr 1.2fr; gap: 86px; align-items: start; }
.faq-section .section-heading { position: sticky; top: 130px; }
.faq-list { display: grid; gap: 10px; }
details { background: rgba(255,255,255,.78); border: 1px solid rgba(23,53,44,.1); border-radius: 18px; overflow: clip; }
summary { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 23px 25px; cursor: pointer; color: var(--ink); font-weight: 800; list-style: none; }
summary::-webkit-details-marker { display: none; }
summary span { width: 30px; height: 30px; flex: 0 0 30px; display: grid; place-items: center; background: var(--green-pale); border-radius: 50%; transition: transform .25s ease; }
details[open] summary span { transform: rotate(45deg); }
details p { padding: 0 70px 25px 25px; color: var(--muted); font-size: 15px; }

.contact-section { overflow: hidden; color: white; background: var(--ink); }
.contact-section::before { content: ""; position: absolute; width: 600px; height: 600px; left: -300px; bottom: -360px; border: 1px solid rgba(138,198,63,.18); border-radius: 50%; box-shadow: 0 0 0 100px rgba(138,198,63,.03), 0 0 0 220px rgba(138,198,63,.02); }
.contact-shell { position: relative; z-index: 1; display: grid; grid-template-columns: .9fr 1.1fr; gap: 72px; align-items: center; }
.contact-copy h2 { color: white; }
.contact-copy > p:not(.eyebrow) { max-width: 590px; color: rgba(255,255,255,.66); }
.eyebrow-light { color: #b7dd83; }
.direct-contact { display: grid; gap: 10px; margin-top: 36px; }
.direct-contact a { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.12); }
.direct-contact span { color: rgba(255,255,255,.46); font-size: 11px; font-weight: 850; letter-spacing: .13em; text-transform: uppercase; }
.direct-contact strong { font-size: 14px; }
.contact-builder { padding: 34px; color: var(--text); background: var(--paper); border-radius: 30px; box-shadow: 0 38px 90px rgba(0,0,0,.22); }
.builder-step + .builder-step { margin-top: 26px; }
.builder-step > p { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: var(--ink); font-size: 14px; font-weight: 850; }
.builder-step > p span { width: 25px; height: 25px; display: grid; place-items: center; color: var(--ink); background: var(--green-pale); border-radius: 8px; font-size: 10px; }
.choice-group { display: flex; flex-wrap: wrap; gap: 8px; }
.choice { padding: 10px 14px; border: 1px solid var(--line); background: white; border-radius: 999px; cursor: pointer; font-size: 13px; font-weight: 750; transition: .2s ease; }
.choice:hover { border-color: rgba(108,166,43,.5); }
.choice.is-active { color: white; background: var(--ink); border-color: var(--ink); }
.builder-preview { margin: 28px 0 18px; padding: 18px; background: var(--cream); border: 1px solid var(--line); border-radius: 16px; }
.builder-preview span { color: var(--green-deep); font-size: 10px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
.builder-preview p { margin: 7px 0 0; color: var(--ink); font-size: 14px; }
.builder-actions { display: grid; grid-template-columns: 1.25fr .75fr; gap: 9px; }
.button-whatsapp { color: white; background: #1f9f57; }
.button-whatsapp svg { width: 19px; fill: currentColor; }
.button-email { color: var(--ink); background: white; border-color: var(--line); }
.contact-builder > small { display: block; margin-top: 13px; color: var(--muted); font-size: 10px; line-height: 1.45; }

.site-footer { padding: 58px 0 24px; background: #10271f; color: white; }
.footer-top { display: grid; grid-template-columns: .8fr 1.2fr .7fr; gap: 48px; align-items: start; padding-bottom: 46px; }
.brand-footer .brand-mark { background: var(--green); color: var(--ink); }
.brand-footer .brand-copy small { color: rgba(255,255,255,.45); }
.footer-top > p { max-width: 520px; color: rgba(255,255,255,.54); font-size: 14px; }
.footer-links { display: grid; gap: 9px; justify-items: start; }
.footer-links a { color: rgba(255,255,255,.72); font-size: 13px; font-weight: 700; }
.footer-links a:hover { color: white; }
.footer-bottom { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.4); font-size: 10px; letter-spacing: .04em; }
.footer-bottom div { display: flex; gap: 16px; }
.footer-bottom a:hover { color: white; }
.mobile-contact-bar { display: none; }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,.2,1); }
.reveal.is-visible { opacity: 1; transform: none; }
.delay-1 { transition-delay: .1s; }
.delay-2 { transition-delay: .2s; }
.delay-3 { transition-delay: .3s; }

/* Legal pages */
.legal-main { min-height: 80vh; padding: 150px 0 100px; }
.legal-hero { max-width: 790px; margin-bottom: 46px; }
.legal-hero h1 { margin-bottom: 16px; color: var(--ink); font-family: Georgia, serif; font-size: clamp(48px, 6vw, 76px); font-weight: 500; letter-spacing: -.045em; line-height: 1.05; }
.legal-hero p { color: var(--muted); }
.legal-card { max-width: 940px; padding: 48px; background: var(--paper); border: 1px solid var(--line); border-radius: 28px; box-shadow: var(--shadow-sm); }
.legal-card h2 { margin: 38px 0 10px; color: var(--ink); font-size: 21px; }
.legal-card h2:first-child { margin-top: 0; }
.legal-card h3 { margin: 24px 0 8px; color: var(--ink); font-size: 17px; }
.legal-card p, .legal-card li { color: #52645d; font-size: 14px; }
.legal-card a { color: var(--green-deep); text-decoration: underline; text-underline-offset: 3px; }
.legal-note { margin: 0 0 28px; padding: 16px 18px; color: #6a4a17; background: #fff1cf; border: 1px solid #ecd298; border-radius: 14px; font-size: 13px; }
.legal-back { display: inline-flex; align-items: center; gap: 7px; margin-top: 28px; color: var(--ink); font-weight: 800; }

@media (max-width: 1050px) {
  :root { --header-height: 76px; }
  .site-nav { gap: 20px; }
  .site-nav > a { font-size: 13px; }
  .hero-grid { gap: 42px; }
  .hero h1 { font-size: clamp(52px, 7vw, 74px); }
  .hero-note-top { right: -4px; }
  .hero-note-bottom { left: -4px; }
  .intro-grid, .about-grid { gap: 56px; }
