  .section { padding: 88px 0; }
  .site-header { background: rgba(247,245,239,.94); border-color: var(--line); backdrop-filter: blur(16px); }
  .nav-toggle { display: block; z-index: 2; }
  .nav-toggle[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-toggle[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
  .nav-toggle[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .site-nav { position: fixed; inset: var(--header-height) 0 auto; display: grid; gap: 0; padding: 18px 20px 26px; background: var(--cream); border-bottom: 1px solid var(--line); box-shadow: 0 30px 60px rgba(23,53,44,.12); transform: translateY(-120%); opacity: 0; visibility: hidden; transition: .3s ease; }
  .site-nav.is-open { transform: none; opacity: 1; visibility: visible; }
  .site-nav > a { padding: 14px 8px; font-size: 16px; }
  .site-nav > a:not(.nav-cta)::after { display: none; }
  .nav-cta { margin-top: 10px; text-align: center; }
  .hero { padding-top: 128px; }
  .hero-grid, .intro-grid, .service-layout, .process-grid, .about-grid, .faq-grid, .contact-shell { grid-template-columns: 1fr; }
  .hero-grid { gap: 62px; }
  .hero-copy { max-width: 720px; }
  .hero-visual { width: min(100%, 670px); margin-inline: auto; }
  .trust-ribbon { margin-top: 65px; }
  .intro-grid, .service-layout, .process-grid, .about-grid, .faq-grid, .contact-shell { gap: 48px; }
  .promise-grid { grid-template-columns: 1fr; }
  .promise-card { min-height: auto; }
  .promise-card h3 { margin-top: 28px; }
  .service-feature { min-height: 440px; }
  .audience-grid, .values-grid { grid-template-columns: 1fr; }
