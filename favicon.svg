/* Opening welcome sequence */
html.intro-running,
html.intro-running body { overflow: hidden; }

.welcome-intro {
  position: fixed;
  z-index: 5000;
  inset: 0;
  display: grid;
  place-items: center;
  overflow: hidden;
  padding: 24px;
  color: white;
  background:
    radial-gradient(circle at 50% 42%, rgba(138, 198, 63, .18), transparent 30%),
    linear-gradient(145deg, #112b23 0%, var(--ink) 48%, #24483d 100%);
  opacity: 1;
  visibility: visible;
  transition: opacity .55s ease, visibility .55s ease;
}
.welcome-intro::before,
.welcome-intro::after {
  content: "";
  position: absolute;
  border: 1px solid rgba(255, 255, 255, .08);
  border-radius: 50%;
  pointer-events: none;
}
.welcome-intro::before {
  width: min(76vw, 760px);
  aspect-ratio: 1;
  animation: welcome-ring 3.4s ease-out both;
}
.welcome-intro::after {
  width: min(48vw, 480px);
  aspect-ratio: 1;
  box-shadow: 0 0 0 90px rgba(255, 255, 255, .018), 0 0 0 180px rgba(255, 255, 255, .012);
  animation: welcome-ring 3.4s .12s ease-out both reverse;
}
.welcome-intro.is-leaving {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.welcome-intro-glow {
  position: absolute;
  width: min(74vw, 720px);
  aspect-ratio: 1;
  background: radial-gradient(circle, rgba(138, 198, 63, .12), transparent 62%);
  filter: blur(18px);
  animation: welcome-glow 3.3s ease-in-out both;
}
.welcome-intro-content {
  position: relative;
  z-index: 1;
  width: min(100%, 620px);
  display: flex;
  align-items: center;
  flex-direction: column;
  text-align: center;
  animation: welcome-content 3.45s cubic-bezier(.2,.7,.2,1) both;
}
.welcome-intro-mark {
  width: 74px;
  height: 74px;
  display: grid;
  place-items: center;
  margin-bottom: 28px;
  color: var(--ink);
  background: var(--green);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 23px;
  box-shadow: 0 22px 55px rgba(0,0,0,.24), inset 0 0 0 1px rgba(255,255,255,.18);
  font-size: 24px;
  font-weight: 950;
  letter-spacing: -.06em;
  animation: welcome-mark 3.3s cubic-bezier(.2,.8,.2,1) both;
}
.welcome-intro-kicker {
  margin: 0 0 9px;
  color: #cbe7a7;
  font-size: 11px;
  font-weight: 850;
  letter-spacing: .2em;
  text-transform: uppercase;
}
.welcome-intro-title {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(48px, 8vw, 86px);
  font-weight: 500;
  line-height: .98;
  letter-spacing: -.055em;
}
.welcome-intro-subtitle {
  margin: 16px 0 0;
  color: rgba(255,255,255,.68);
  font-size: clamp(14px, 2vw, 18px);
  font-weight: 650;
  letter-spacing: .05em;
}
.welcome-intro-progress {
  width: min(210px, 54vw);
  height: 2px;
  margin-top: 34px;
  overflow: hidden;
  background: rgba(255,255,255,.14);
  border-radius: 999px;
}
.welcome-intro-progress i {
  width: 100%;
  height: 100%;
  display: block;
  background: linear-gradient(90deg, #b7dd83, var(--green), #dff0e8);
  border-radius: inherit;
  transform: scaleX(0);
  transform-origin: left;
  animation: welcome-progress 3s .28s cubic-bezier(.2,.65,.25,1) forwards;
}

@keyframes welcome-content {
  0% { opacity: 0; transform: translateY(24px) scale(.985); }
  18%, 82% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-12px) scale(1.01); }
}
@keyframes welcome-mark {
  0% { opacity: 0; transform: translateY(16px) rotate(-8deg) scale(.75); }
  20%, 78% { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
  100% { opacity: 0; transform: translateY(-8px) scale(.94); }
}
@keyframes welcome-progress { to { transform: scaleX(1); } }
@keyframes welcome-ring {
  0% { opacity: 0; transform: scale(.72); }
  30% { opacity: 1; }
  100% { opacity: 0; transform: scale(1.1); }
}
@keyframes welcome-glow {
  0%, 100% { opacity: .35; transform: scale(.8); }
  52% { opacity: 1; transform: scale(1.08); }
}

@media (max-width: 600px) {
  .welcome-intro { padding: 20px; }
  .welcome-intro-mark { width: 64px; height: 64px; margin-bottom: 24px; border-radius: 20px; font-size: 21px; }
  .welcome-intro-title { font-size: clamp(44px, 14vw, 64px); }
  .welcome-intro-subtitle { margin-top: 13px; font-size: 14px; }
  .welcome-intro-progress { margin-top: 29px; }
}

@media (prefers-reduced-motion: reduce) {
  .welcome-intro,
  .welcome-intro-content,
  .welcome-intro-mark,
  .welcome-intro-glow,
  .welcome-intro::before,
  .welcome-intro::after,
  .welcome-intro-progress i { animation: none !important; }
}

/* Website chat */
.button-secondary { color: var(--ink); background: rgba(255,255,255,.86); border-color: rgba(23,53,44,.14); }
.button-secondary:hover { background: white; transform: translateY(-1px); }
.contact-chat-cta {
  width: 100%; display: grid; grid-template-columns: 48px minmax(0,1fr) 24px; gap: 14px; align-items: center;
  margin-top: 28px; padding: 14px 16px; color: var(--ink); background: rgba(255,255,255,.96);
  border: 1px solid rgba(255,255,255,.18); border-radius: 18px; cursor: pointer; text-align: left;
  box-shadow: 0 18px 46px rgba(0,0,0,.16); transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
}
.contact-chat-cta:hover { transform: translateY(-2px); box-shadow: 0 24px 55px rgba(0,0,0,.22); background: white; }
.contact-chat-icon { width: 48px; height: 48px; display: grid; place-items: center; color: white; background: var(--ink); border-radius: 15px; }
.contact-chat-icon svg { width: 23px; fill: currentColor; }
.contact-chat-cta strong, .contact-chat-cta small { display: block; }
.contact-chat-cta strong { font-size: 15px; }
.contact-chat-cta small { margin-top: 3px; color: var(--muted); font-size: 11px; }
.contact-chat-arrow { color: var(--green-deep); font-size: 23px; font-weight: 800; }
body.chat-open { overflow: hidden; }
.site-chat { position: fixed; z-index: 6000; inset: 0; display: grid; place-items: center; padding: 22px; }
.site-chat[hidden] { display: none; }
.site-chat-backdrop { position: absolute; inset: 0; background: rgba(8,24,19,.68); backdrop-filter: blur(8px); animation: chat-fade .22s ease both; }
.chat-window {
  position: relative; width: min(100%, 460px); max-height: min(760px, calc(100dvh - 44px)); display: grid;
  grid-template-rows: auto minmax(0,1fr) auto; overflow: hidden; color: var(--text); background: #efeae2;
  border: 1px solid rgba(255,255,255,.38); border-radius: 28px; box-shadow: 0 40px 120px rgba(0,0,0,.38);
  animation: chat-enter .3s cubic-bezier(.2,.8,.2,1) both;
}
.chat-header { display: grid; grid-template-columns: 46px minmax(0,1fr) 42px; gap: 12px; align-items: center; padding: 15px 15px 15px 17px; color: white; background: linear-gradient(135deg,#17352c,#24483d); }
.chat-avatar { width: 46px; height: 46px; display: grid; place-items: center; color: var(--ink); background: var(--green); border-radius: 50%; font-size: 15px; font-weight: 950; }
.chat-header-copy { min-width: 0; }
.chat-header-copy strong { display: block; font-size: 15px; }
.chat-header-copy span { display: flex; align-items: center; gap: 6px; margin-top: 2px; color: rgba(255,255,255,.72); font-size: 11px; }
.chat-header-copy i { width: 7px; height: 7px; background: #7de36f; border-radius: 50%; box-shadow: 0 0 0 3px rgba(125,227,111,.12); }
.chat-close { width: 40px; height: 40px; padding: 0; color: white; background: rgba(255,255,255,.09); border: 0; border-radius: 50%; cursor: pointer; font-size: 28px; line-height: 1; }
.chat-close:hover { background: rgba(255,255,255,.17); }
.chat-body {
  min-height: 430px; overflow-y: auto; overscroll-behavior: contain; padding: 20px 17px 24px;
  background-color: #efeae2;
  background-image: radial-gradient(rgba(23,53,44,.045) .8px, transparent .8px);
  background-size: 13px 13px;
  scroll-behavior: smooth;
}
.chat-day { display: flex; justify-content: center; margin-bottom: 16px; }
.chat-day span { padding: 5px 10px; color: #66726e; background: rgba(255,255,255,.8); border-radius: 999px; font-size: 10px; box-shadow: 0 3px 10px rgba(23,53,44,.06); }
.chat-bubble { width: fit-content; max-width: 88%; margin-bottom: 10px; padding: 11px 12px 7px; border-radius: 7px 16px 16px 16px; box-shadow: 0 2px 9px rgba(23,53,44,.09); animation: message-in .28s ease both; }
.chat-bubble[hidden], .chat-typing[hidden], .chat-actions[hidden] { display: none; }
.chat-bubble-bot { position: relative; background: white; }
.chat-bubble-bot::before { content: ""; position: absolute; top: 0; left: -7px; border-width: 0 8px 9px 0; border-style: solid; border-color: transparent white transparent transparent; }
.chat-bubble p { margin: 0; font-size: 14px; line-height: 1.48; }
.chat-bubble p + p { margin-top: 9px; }
.chat-bubble time { display: block; margin-top: 4px; color: #84908b; font-size: 9px; text-align: right; }
.chat-typing { width: 58px; display: flex; gap: 4px; align-items: center; margin-bottom: 10px; padding: 13px 14px; background: white; border-radius: 7px 16px 16px 16px; box-shadow: 0 2px 9px rgba(23,53,44,.09); }
.chat-typing span { width: 7px; height: 7px; background: #8b9692; border-radius: 50%; animation: typing-dot 1s infinite ease-in-out; }
.chat-typing span:nth-child(2) { animation-delay: .15s; }
.chat-typing span:nth-child(3) { animation-delay: .3s; }
.chat-actions { display: grid; gap: 9px; margin-top: 17px; animation: message-in .28s ease both; }
.chat-actions a { min-height: 47px; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 11px 15px; border-radius: 14px; font-size: 13px; font-weight: 850; text-align: center; }
.chat-whatsapp { color: white; background: #1f9f57; box-shadow: 0 12px 24px rgba(31,159,87,.2); }
.chat-whatsapp:hover { background: #198a4b; }
.chat-whatsapp svg { width: 19px; fill: currentColor; }
.chat-email { color: var(--ink); background: rgba(255,255,255,.84); border: 1px solid rgba(23,53,44,.12); }
.chat-email:hover { background: white; }
.chat-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 15px; background: #f8f6f1; border-top: 1px solid rgba(23,53,44,.1); }
.chat-footer p { margin: 0; color: var(--muted); font-size: 9px; line-height: 1.35; }
.chat-footer a { flex: 0 0 auto; color: var(--green-deep); font-size: 10px; font-weight: 800; }
@keyframes chat-enter { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: none; } }
@keyframes chat-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes message-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes typing-dot { 0%,60%,100% { transform: translateY(0); opacity: .45; } 30% { transform: translateY(-4px); opacity: 1; } }
@media (max-width: 600px) {
  .site-chat { padding: 0; align-items: end; }
  .chat-window { width: 100%; max-height: 92dvh; border-radius: 24px 24px 0 0; }
  .chat-body { min-height: 390px; padding-inline: 14px; }
  .chat-footer { padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  .hero-actions .button-secondary { order: 3; }
  .contact-chat-cta { margin-top: 22px; }
}
@media (prefers-reduced-motion: reduce) {
  .site-chat-backdrop, .chat-window, .chat-bubble, .chat-actions { animation: none !important; }
  .chat-typing span { animation-duration: 1.8s !important; }
}
