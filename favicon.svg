  .footer-bottom { align-items: flex-start; flex-direction: column; }
  .mobile-contact-bar { position: fixed; z-index: 900; left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: .8fr 1.2fr; padding: 8px; background: rgba(255,253,249,.96); border-top: 1px solid var(--line); backdrop-filter: blur(12px); }
  .mobile-contact-bar a { display: grid; place-items: center; min-height: 48px; border-radius: 14px; font-size: 13px; font-weight: 850; }
  .mobile-contact-bar a:first-child { color: var(--ink); }
  .mobile-contact-bar a:last-child { color: white; background: #1f9f57; }
