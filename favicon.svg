  .values-shell { padding: 58px; }
  .partner-card { grid-template-columns: 115px 1fr; }
  .partner-copy { grid-column: 2; }
  .contact-shell { gap: 44px; }
}

@media (max-width: 860px) {
  body { font-size: 16px; }
